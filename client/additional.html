<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Text Page</title>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            padding: 20px;
            text-align: center;
            background-color: #f4f7f9;
        }
        .content {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 50px auto;
        }
        h2 {
            color: #333;
        }
        p {
            margin-bottom: 30px;
            line-height: 1.6;
            color: #555;
        }
        .back-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="content">
        <h2>A Page with Random Text</h2>
        <p>
            The quick brown fox jumps over the lazy dog. This sentence is an English-language pangram—a sentence that contains every letter of the alphabet. 
            It is commonly used for testing typefaces and keyboards, and for displaying examples of font and writing.
        </p>
        <p>
            <a href="index.html" class="back-button">← Go Back to Index</a>
        </p>
    </div>
</body>
</html>
